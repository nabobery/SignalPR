name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-22.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'eslint.config.*'
              - '.prettierrc*'
              - '.github/workflows/ci.yml'
            rust:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend (lint, typecheck, test, build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:frontend

      - name: Build frontend bundle
        run: pnpm build

  rust:
    name: Rust (fmt, clippy, test)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  ci-ok:
    name: CI OK
    needs: [changes, frontend, rust]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs passed
        run: |
          frontend="${{ needs.frontend.result }}"
          rust="${{ needs.rust.result }}"
          echo "frontend=$frontend rust=$rust"
          if [[ "$frontend" == "failure" || "$frontend" == "cancelled" ]]; then
            echo "Frontend job failed"
            exit 1
          fi
          if [[ "$rust" == "failure" || "$rust" == "cancelled" ]]; then
            echo "Rust job failed"
            exit 1
          fi
          echo "All required checks passed (skipped jobs count as success)."
